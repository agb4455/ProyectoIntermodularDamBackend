# Configuración principal — todos los valores vienen de variables de entorno
spring.application.name=db_back

# Datasource — conexión a PostgreSQL
spring.datasource.url=${POSTGRES_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway gestiona el schema, JPA solo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# MongoDB — analíticas
spring.data.mongodb.uri=${MONGODB_URL}

# Flyway — migraciones automáticas al arrancar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Servidor
server.port=${PORT:8080}

# Handshake JWT — secreto compartido con el Middle Server
app.handshake-secret=${DB_HANDSHAKE_SECRET}
app.handshake-token-ttl-hours=${HANDSHAKE_TOKEN_TTL_HOURS:24}
