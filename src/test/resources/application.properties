# Configuración de pruebas — usamos Testcontainers para integración
app.handshake-secret=test-secret-mínimo-32-chars-ok!!
DB_HANDSHAKE_SECRET=test-secret-mínimo-32-chars-ok!!
app.handshake-token-ttl-hours=1


# NO excluir auto-configuraciones aquí, ya que rompería los tests de integración.
# Los tests unitarios usan standaloneSetup() y no se ven afectados por estas propiedades.

# Valores por defecto para evitar errores de placeholder antes de que Testcontainers inyecte los reales
POSTGRES_URL=jdbc:postgresql://localhost:5432/dummy
MONGODB_URL=mongodb://localhost:27017/dummy

# Logging para diagnóstico
logging.level.org.springframework.web=DEBUG
logging.level.com.tfm.db_back=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway - asegurar que se ejecuta y encuentra las migraciones
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false
spring.flyway.check-location=true
spring.flyway.locations=classpath:db/migration
